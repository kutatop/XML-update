name: Update filtered feed

on:
  schedule:
    # Дважды в день: в 06:00 и 15:00 UTC (09:00 и 18:00 по Киеву летом)
    - cron: "0 6,15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run filter script
        run: python filter_feed.py

      - name: Commit and push result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/filtered_feed.xml
          git diff --quiet --cached || git commit -m "Auto-update filtered feed $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
